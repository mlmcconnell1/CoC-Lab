# Example recipe: ACS-only Glynn/Fox metro panel.
# Builds lagged ACS5 demographic and income measures for the 25 fixed metros
# across the 2010/2020 tract-vintage boundary for 2019-2025.

version: 1
name: metro_glynnfox_acs_income_2019_2025
description: >
  Build an ACS-only metro panel for the fixed 25 Glynn/Fox metros. This is the
  closest runnable counterpart to a "smallest 25 metros above 1M population"
  example in the current package because the metro definition is fixed in-code.
  Analysis years 2019-2025 use lagged ACS5 vintages and cross the 2010/2020
  tract geometry boundary.

universe:
  range: "2019-2025"

targets:
  - id: metro_panel
    geometry: { type: metro, source: glynn_fox_v1 }
    outputs: [panel]

# Source datasets.
datasets:
  acs_tract:
    provider: census
    product: acs5
    version: 1
    native_geometry: { type: tract }
    geo_column: tract_geoid
    file_set:
      path_template: "data/curated/acs/acs5_tracts__A{acs_end}xT{tract}.parquet"
      segments:
        - years: "2019-2020"
          geometry: { type: tract, vintage: 2010 }
          constants: { tract: 2010 }
          year_offsets: { acs_end: -1 }
        - years: "2021-2025"
          geometry: { type: tract, vintage: 2020 }
          constants: { tract: 2020 }
          year_offsets: { acs_end: -1 }

transforms:
  - id: tract_to_metro_2010
    type: crosswalk
    from: { type: tract, vintage: 2010 }
    to: { type: metro, source: glynn_fox_v1 }
    spec:
      weighting:
        scheme: area

  - id: tract_to_metro_2020
    type: crosswalk
    from: { type: tract, vintage: 2020 }
    to: { type: metro, source: glynn_fox_v1 }
    spec:
      weighting:
        scheme: area

# Pipeline: aggregate ACS from tracts to the metro definition.
pipelines:
  - id: build_metro_panel
    target: metro_panel
    steps:
      - materialize:
          transforms: [tract_to_metro_2010, tract_to_metro_2020]

      - resample:
          dataset: acs_tract
          to_geometry: { type: metro, source: glynn_fox_v1 }
          method: aggregate
          via: auto
          measures:
            total_population: { aggregation: sum }
            adult_population: { aggregation: sum }
            population_below_poverty: { aggregation: sum }
            median_household_income: { aggregation: weighted_mean }
            median_gross_rent: { aggregation: weighted_mean }

      - join:
          datasets: [acs_tract]
          join_on: [geo_id, year]

validation:
  crosswalk_coverage:
    warn_below: 0.95
    fail_below: 0.90
  missing_dataset:
    default: fail
