version: 1
name: metro_glynnfox_pit_pep_2011_2014
description: >
  Build an early-year metro panel with PIT and PEP only. This example is
  intentionally pre-ZORI and pre-ACS1, which makes it a good starting point
  for users who want a smaller recipe that still exercises metro aggregation
  from both CoC and county inputs.

universe:
  range: "2011-2014"

targets:
  - id: metro_panel
    geometry: { type: metro, source: glynn_fox_v1 }
    outputs: [panel]

datasets:
  pit:
    provider: hud
    product: pit
    version: 1
    native_geometry: { type: coc }
    years: "2011-2014"
    year_column: pit_year
    geo_column: coc_id
    params:
      vintage: 2024
      align: point_in_time_jan
    path: data/curated/pit/pit_vintage__P2024.parquet

  pep_county:
    provider: census
    product: pep
    version: 1
    native_geometry: { type: county, vintage: 2020 }
    years: "2011-2014"
    year_column: year
    geo_column: county_fips
    params:
      series: postcensal
      vintage: 2020
    path: data/curated/pep/pep_county__v2020.parquet

transforms:
  - id: coc_to_metro
    type: crosswalk
    from: { type: coc, vintage: 2025, source: hud_exchange }
    to: { type: metro, source: glynn_fox_v1 }
    spec:
      weighting:
        scheme: area

  - id: county_to_metro_area
    type: crosswalk
    from: { type: county, vintage: 2020 }
    to: { type: metro, source: glynn_fox_v1 }
    spec:
      weighting:
        scheme: area

pipelines:
  - id: build_metro_panel
    target: metro_panel
    steps:
      - materialize:
          transforms: [coc_to_metro, county_to_metro_area]

      - resample:
          dataset: pit
          to_geometry: { type: metro, source: glynn_fox_v1 }
          method: aggregate
          via: coc_to_metro
          measures: [pit_total, pit_sheltered, pit_unsheltered]
          aggregation: sum

      - resample:
          dataset: pep_county
          to_geometry: { type: metro, source: glynn_fox_v1 }
          method: aggregate
          via: county_to_metro_area
          measures: [population]
          aggregation: sum

      - join:
          datasets: [pit, pep_county]
          join_on: [geo_id, year]

validation:
  crosswalk_coverage:
    warn_below: 0.95
    fail_below: 0.90
  missing_dataset:
    default: fail
