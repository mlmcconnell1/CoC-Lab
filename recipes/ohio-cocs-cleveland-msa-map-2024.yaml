version: 1
name: ohio_cocs_cleveland_msa_map_2024
description: >
  Render all Ohio CoC boundaries with statewide 2020 Census tract geometry
  and the Cleveland, Ohio Census MSA boundary overlaid as a single
  recipe-native HTML map artifact.

universe:
  years: [2024]

targets:
  - id: ohio_overlay_map
    geometry: { type: coc, vintage: 2025, source: hud_exchange }
    outputs: [map]
    map_spec:
      basemap: cartodbpositron
      viewport:
        fit_layers: true
        padding: 30
      layers:
        - geometry: { type: coc, vintage: 2025, source: hud_exchange }
          selector_ids:
            [OH-500, OH-501, OH-502, OH-503, OH-504, OH-505, OH-506, OH-507, OH-508]
          label: Ohio CoCs
          tooltip_fields: [coc_id, coc_name, state_abbrev]
          style_mode: distinct
          style:
            fill_color: "#f4a261"
            stroke_color: "#7f5539"
            fill_opacity: 0.22
            stroke_opacity: 0.9
            line_weight: 1.5
            z_order: 0
