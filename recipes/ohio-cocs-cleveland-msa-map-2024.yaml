datasets:
  pit:
    provider: hud
    product: pit
    version: 1
    native_geometry: { type: coc }
    years: "2024-2024"
    year_column: pit_year
    geo_column: coc_id
    params:
      vintage: 2024
      align: point_in_time_jan
    path: data/curated/pit/pit_vintage__P2024.parquet

pipelines:
  - id: build_map
    target: ohio_overlay_map
    steps:
      - resample:
          dataset: pit
          to_geometry: { type: coc, vintage: 2025, source: hud_exchange }
          method: identity
          measures: [pit_total]

